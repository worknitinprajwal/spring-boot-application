name: Build & Deploy Fitness Tracker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'terraform/**'
      - '.github/workflows/terraform-apply.yml'
      - '.github/workflows/terraform-destroy.yml'

env:
  DOCKER_IMAGE: worknitinprajwal/fitness-tracker
  HELM_CHART_PATH: k8s/helm-chart
  K8S_NAMESPACE: fitness-tracker

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tag
        id: tag
        run: |
          TAG="main-$(git rev-parse --short HEAD)-$(date +%s)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building image: $DOCKER_IMAGE:$TAG"

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Update Helm values.yaml
        run: |
          cd $HELM_CHART_PATH
          sed -i "s|repository:.*|repository: $DOCKER_IMAGE|" values.yaml
          sed -i "s|tag:.*|tag: ${{ steps.tag.outputs.tag }}|" values.yaml
          sed -i "s|pullPolicy:.*|pullPolicy: Always|" values.yaml
          echo "Updated values.yaml with new image tag: ${{ steps.tag.outputs.tag }}"

      - name: Commit updated Helm values
        run: |
          git config user.name "DevOps AI agent"
          git config user.email "devops-ai-agent@wipro.com"
          git add $HELM_CHART_PATH/values.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update image tag to ${{ steps.tag.outputs.tag }} [skip ci]"
          git fetch origin main
          git push --force-with-lease origin main
