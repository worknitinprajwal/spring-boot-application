name: Terraform Apply - Create Infrastructure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-apply.yml'

env:
  TF_VAR_cluster_name: fitness-tracker
  TF_VAR_image_repository: worknitinprajwal/fitness-tracker

jobs:
  terraform-apply:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify required tools
        run: |
          echo "kind: $(kind version)"
          echo "helm: $(helm version --short)"
          echo "terraform: $(terraform version | head -1)"
          echo "kubectl: $(kubectl version --client)"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get ArgoCD Password
        run: |
          echo "ArgoCD URL: http://localhost:30001"
          echo "Retrieving admin password..."
          kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" 2>/dev/null | base64 -d || echo "Secret not yet available"

      - name: Setup Cloudflare Tunnel
        run: |
          CLOUDFLARED="/tmp/cloudflared"
          if [ ! -f "$CLOUDFLARED" ]; then
            echo "Installing cloudflared..."
            curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$CLOUDFLARED"
            chmod +x "$CLOUDFLARED"
          fi

          # Stop existing tunnel if running
          sudo systemctl stop cloudflared-tunnel.service 2>/dev/null || true

          # Create systemd service (printf avoids YAML parsing [Unit] as flow sequence)
          printf '%s\n' \
            '[Unit]' \
            'Description=Cloudflare Tunnel for Spring Boot App' \
            'After=network.target docker.service' \
            'Requires=docker.service' \
            '' \
            '[Service]' \
            'Type=simple' \
            'User=ubuntu' \
            'ExecStart=/tmp/cloudflared tunnel --url http://localhost:3000 --no-autoupdate' \
            'Restart=always' \
            'RestartSec=5' \
            '' \
            '[Install]' \
            'WantedBy=multi-user.target' \
            | sudo tee /etc/systemd/system/cloudflared-tunnel.service > /dev/null

          sudo systemctl daemon-reload
          sudo systemctl enable cloudflared-tunnel.service
          sudo systemctl start cloudflared-tunnel.service

          # Wait for tunnel URL
          sleep 10
          TUNNEL_URL=$(sudo journalctl -u cloudflared-tunnel.service --since "30 sec ago" --no-pager 2>/dev/null | grep -o "https://[a-z0-9-]*\.trycloudflare\.com" | tail -1)
          echo "============================================"
          echo " App URL: $TUNNEL_URL"
          echo " Health:  $TUNNEL_URL/actuator/health"
          echo " Workouts: $TUNNEL_URL/api/workouts"
          echo "============================================"

      - name: Setup ArgoCD Public Tunnel
        run: |
          ARGOCD_SERVICE="cloudflared-argocd.service"

          # Stop previous ArgoCD tunnel if exists
          sudo systemctl stop "$ARGOCD_SERVICE" 2>/dev/null || true
          pkill -f "kubectl.*port-forward.*argocd" 2>/dev/null || true

          # Start kubectl port-forward to expose ArgoCD on localhost:30080
          export KUBECONFIG="$HOME/.kube/kind-config-${TF_VAR_cluster_name}"
          nohup kubectl port-forward -n argocd svc/argocd-server 30080:80 --address 0.0.0.0 \
            > /tmp/argocd-port-forward.log 2>&1 &
          echo "ArgoCD port-forward started (PID: $!)"

          # Wait for port-forward to be ready
          for i in $(seq 1 10); do
            if curl -s -o /dev/null http://localhost:30080 2>/dev/null; then
              echo "Port-forward ready"
              break
            fi
            sleep 2
          done

          # Create systemd service for ArgoCD tunnel
          printf '%s\n' \
            '[Unit]' \
            'Description=Cloudflare Tunnel for ArgoCD' \
            'After=network.target' \
            'Requires=network.target' \
            '' \
            '[Service]' \
            'Type=simple' \
            'User=ubuntu' \
            'ExecStart=/tmp/cloudflared tunnel --url http://localhost:30080 --no-autoupdate' \
            'Restart=always' \
            'RestartSec=5' \
            '' \
            '[Install]' \
            'WantedBy=multi-user.target' \
            | sudo tee "/etc/systemd/system/$ARGOCD_SERVICE" > /dev/null

          sudo systemctl daemon-reload
          sudo systemctl enable "$ARGOCD_SERVICE"
          sudo systemctl start "$ARGOCD_SERVICE"

          # Wait for ArgoCD tunnel URL
          sleep 10
          ARGOCD_URL=$(sudo journalctl -u "$ARGOCD_SERVICE" --since "30 sec ago" --no-pager 2>/dev/null | grep -o "https://[a-z0-9-]*\.trycloudflare\.com" | tail -1)
          echo "============================================"
          echo " ArgoCD URL: $ARGOCD_URL"
          echo " Username: admin"
          echo " Password: (see step above)"
          echo "============================================"
