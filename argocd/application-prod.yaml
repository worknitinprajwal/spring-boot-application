apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitness-tracker-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Git repository containing Helm chart
    repoURL: https://github.com/YOUR-USERNAME/fitness-tracker.git  # UPDATE THIS
    targetRevision: main  # Deploy from main branch
    path: k8s/helm-chart
    helm:
      valueFiles:
        - values.yaml
        - ../overlays/prod/values-prod.yaml

  destination:
    server: https://kubernetes.default.svc  # in-cluster (igs)
    namespace: prod

  syncPolicy:
    # Manual sync for production (require approval)
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
