replicaCount: 4

image:
  repository: anuddeeph2/fitness-tracker
  tag: develop-183
  pullPolicy: Always

service:
  type: NodePort
  port: 8080
  nodePort: 30080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: fitness-tracker.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"

healthCheck:
  enabled: true
  path: /actuator/health
  port: 8080
