# Development Environment Values
# Overrides for dev cluster deployment

replicaCount: 1

image:
  pullPolicy: Always

service:
  type: NodePort
  port: 8080
  nodePort: 30080  # Fixed NodePort for dev

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: fitness-tracker-dev.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "dev"
  - name: LOGGING_LEVEL_ROOT
    value: "DEBUG"
